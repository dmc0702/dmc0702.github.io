<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程资料 · 列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background-image: url('https://picsum.photos/id/1036/1920/1080');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.5s ease;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .quote-mark {
            position: absolute;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        .list-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .list-item i {
            width: 2rem;
            text-align: center;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .list-item .title {
            flex: 1;
            font-weight: 500;
            margin-left: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-item .badge {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            color: rgba(255, 255, 255, 0.6);
        }
        html {
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }
        .wallpaper-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen text-white">
<div class="min-h-screen flex flex-col">

    <!-- 导航栏 (简化，保留头像和标题) -->
    <nav class="glass p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-white/20 hover:border-white/40 transition-all duration-300">
                <img src="https://cdn.luogu.com.cn/upload/usericon/1048333.png" class="w-full h-full object-cover" alt="avatar">
            </div>
            <h1 class="text-3xl font-bold tracking-tight" style="font-family: 'Pacifico', cursive;">Courseware</h1>
        </div>
        <div class="flex space-x-4">
            <button id="openSettings" class="p-2 hover:bg-white/10 rounded-full transition-colors relative group">
                <i class="fas fa-cog text-xl"></i>
                <span class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-xs bg-black/50 backdrop-blur-sm px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">壁纸</span>
            </button>
            <!-- 返回主页按钮 (链接到 dmc0702.github.io) -->
            <a href="https://dmc0702.github.io" target="_blank" rel="noopener" class="p-2 hover:bg-white/10 rounded-full transition-colors relative group">
                <i class="fas fa-home text-xl"></i>
                <span class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-xs bg-black/50 backdrop-blur-sm px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">返回主页</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 p-8 max-w-6xl mx-auto w-full">
        <!-- 简洁头部说明 -->
        <div class="glass rounded-2xl p-4 mb-6 text-center relative overflow-hidden">
            <span class="quote-mark left text-3xl">“</span>
            <p class="text-sm text-white/70">
                <i class="fas fa-book-open mr-2 text-blue-300"></i> 
                dmc0702 的课程笔记 · 点击标题下载PDF
            </p>
            <span class="quote-mark right text-3xl">”</span>
        </div>

        <!-- 主卡片：链接列表 -->
        <div class="glass rounded-2xl p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center border-b border-white/10 pb-3">
                <i class="fas fa-file-pdf mr-3 text-red-300"></i>
                算法学习资料
                <span class="ml-auto text-sm font-normal text-white/40 bg-white/5 px-3 py-1 rounded-full">{{COUNT}}个文件</span>
            </h2>

            <!-- 动态生成的列表网格 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="pdf-list-container">
                <!-- 列表将由 JavaScript 动态生成，以保证链接准确且可维护 -->
            </div>

            <!-- 底部装饰 -->
            <div class="flex items-center justify-center gap-2 mt-8">
                <div class="w-8 h-px bg-white/20"></div>
                <div class="w-1 h-1 rounded-full bg-white/30"></div>
                <span class="text-xs text-white/40 px-2">共 {{COUNT}} 份讲义</span>
                <div class="w-1 h-1 rounded-full bg-white/30"></div>
                <div class="w-8 h-px bg-white/20"></div>
            </div>
        </div>

        <!-- 额外的返回主页按钮 (备用的文本按钮) -->
        <div class="glass rounded-2xl p-5 mt-6 text-center flex justify-center items-center gap-4">
            <i class="fas fa-arrow-left text-green-300/60"></i>
            <a href="https://dmc0702.github.io" target="_blank" rel="noopener" class="text-white/80 hover:text-white transition-colors underline decoration-white/30 underline-offset-4">
                返回 dmc0702.github.io 主页
            </a>
            <i class="fas fa-external-link-alt text-white/30"></i>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="glass p-4 text-center text-sm text-white/60">
        <p>
            <i class="far fa-copyright mr-1"></i>
            2025 dmc0702 课程列表 
            <span class="mx-2">·</span>
            Made with <i class="fas fa-heart text-red-400 mx-1"></i> for learners
            <span class="mx-2">·</span>
            <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="hover:text-white transition-colors">
                <i class="fas fa-arrow-up"></i> 顶部
            </button>
        </p>
    </footer>
</div>

<!-- 回到顶部按钮 -->
<button id="backToTop" class="fixed bottom-8 right-8 glass w-12 h-12 rounded-full flex items-center justify-center opacity-0 invisible transition-all duration-300 hover:bg-white/20 hover:scale-110">
    <i class="fas fa-arrow-up"></i>
</button>

<!-- 壁纸设置弹窗 (保留原功能) -->
<div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 items-center justify-center hidden">
    <div class="glass rounded-2xl w-full max-w-2xl animate-fadeIn">
        <div class="p-6 flex justify-between items-center border-b border-white/10">
            <h2 class="text-xl font-bold flex items-center">
                <i class="fas fa-cog mr-2"></i> 壁纸设置
            </h2>
            <button id="closeSettings" class="text-white/60 hover:text-white transition-colors p-2 hover:bg-white/10 rounded-full">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="p-6">
            <h3 class="text-sm font-semibold mb-3 text-white/80 flex items-center">
                <i class="fas fa-image mr-2"></i> 个性壁纸
            </h3>
            <div class="flex flex-wrap gap-3">
                <button class="wallpaper-btn px-4 py-2 rounded-lg glass hover:bg-white/10" data-wallpaper="default">🌄 默认</button>
                <button class="wallpaper-btn px-4 py-2 rounded-lg glass hover:bg-white/10" data-wallpaper="daily">📅 每日一图</button>
                <button class="wallpaper-btn px-4 py-2 rounded-lg glass hover:bg-white/10" data-wallpaper="scenery">🏞️ 风景</button>
                <button class="wallpaper-btn px-4 py-2 rounded-lg glass hover:bg-white/10" data-wallpaper="anime">🎮 动漫</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ===== 1. 核心数据：您提供的所有 PDF 链接（已整理为对象数组）=====
    const pdfFiles = [
        { name: "Convex Hull Trick", file: "Convex Hull Trick.pdf" },
        { name: "Count DP", file: "Count DP.pdf" },
        { name: "DFS序维护树上信息", file: "DFS序维护树上信息.pdf" },
        { name: "DP on Subsets", file: "DP on Subsets.pdf" },
        { name: "Digit Count DP", file: "Digit Count DP.pdf" },
        { name: "Eulerian Path", file: "Eulerian Path.pdf" },
        { name: "FHQ Treap Tree", file: "FHQ Treap Tree.pdf" },
        { name: "Monotonic+Queue+Optimization", file: "Monotonic+Queue+Optimization.pdf" },
        { name: "Quadrangle Inequality Optimization", file: "Quadrangle Inequality Optimization.pdf" },
        { name: "Scapegoat Tree", file: "Scapegoat Tree.pdf" },
        { name: "Splay Tree", file: "Splay+Tree.pdf" },          // 文件名含+，已保留
        { name: "Treap Tree", file: "Treap Tree.pdf" },
        { name: "Tree Dynamic Programming", file: "Tree Dynamic Programming.pdf" },
        { name: "nullfile", file: "nullfile.txt" },              // 文本文件，保留原始链接
        { name: "扫描线与离线知识复习", file: "扫描线与离线知识复习.pdf" },
        { name: "树链剖分", file: "树链剖分.pdf" },
        { name: "线段树", file: "线段树.pdf" }
    ];

    // 基础 URL
    const baseUrl = "https://dmc0702.github.io/courseware/";

    // 更新卡片总数显示 (两个地方)
    function updateCountDisplay() {
        const countSpans = document.querySelectorAll('#pdf-list-container ~ .flex .text-xs, h2 .rounded-full');
        // 简单处理：直接设置 h2 旁边的计数
        const h2Count = document.querySelector('h2 .rounded-full');
        if (h2Count) h2Count.innerText = pdfFiles.length + '个文件';
        // 底部装饰计数
        const footerCount = document.querySelector('.flex.justify-center.gap-2 .text-xs.px-2');
        if (footerCount) footerCount.innerText = `共 ${pdfFiles.length} 份讲义`;
    }

    // ===== 2. 动态生成列表 =====
    function renderPdfList() {
        const container = document.getElementById('pdf-list-container');
        if (!container) return;

        let htmlStr = '';
        pdfFiles.forEach(item => {
            // 对文件名进行编码，保留特殊字符如 + 和中文，但空格等需处理
            // 直接使用 encodeURIComponent 编码整个文件名，但注意 URL 中路径部分不应编码，只编码文件名
            const encodedFile = encodeURIComponent(item.file);
            const fullUrl = baseUrl + encodedFile;
            
            // 根据文件扩展名显示不同图标
            const isPdf = item.file.toLowerCase().endsWith('.pdf');
            const iconClass = isPdf ? 'fa-file-pdf text-red-300' : 'fa-file-alt text-gray-300';
            
            htmlStr += `
                <div class="list-item group">
                    <i class="fas ${iconClass}"></i>
                    <span class="title" title="${item.name}">${item.name}</span>
                    <a href="${fullUrl}" target="_blank" rel="noopener" class="badge hover:bg-white/20 transition-colors">
                        ${isPdf ? 'PDF' : 'TXT'} <i class="fas fa-external-link-alt ml-1 text-[10px]"></i>
                    </a>
                </div>
            `;
        });
        container.innerHTML = htmlStr;
        updateCountDisplay();
    }

    // ===== 3. 壁纸功能 (完全保留原逻辑) =====
    (function() {
        const wallpapers = {
            default: 'https://picsum.photos/id/1036/1920/1080',
            daily: 'https://picsum.photos/1920/1080?random&' + new Date().toDateString(),
            scenery: 'https://picsum.photos/1920/1080?random=1&' + Math.random(),
            anime: 'https://picsum.photos/1920/1080?random=2&' + Math.random()
        };
        const savedWallpaper = localStorage.getItem('wallpaper_dmc') || 'default';
        
        function applyWallpaper(type) {
            document.body.style.backgroundImage = `url('${wallpapers[type]}')`;
            localStorage.setItem('wallpaper_dmc', type);
            document.querySelectorAll('.wallpaper-btn').forEach(btn => {
                if (btn.dataset.wallpaper === type) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        window.addEventListener('load', () => {
            applyWallpaper(savedWallpaper);
            renderPdfList();  // 渲染列表
        });

        // 为壁纸按钮添加事件 (需等待DOM)
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('wallpaper-btn') || e.target.closest('.wallpaper-btn')) {
                const btn = e.target.closest('.wallpaper-btn');
                if (btn && btn.dataset.wallpaper) {
                    applyWallpaper(btn.dataset.wallpaper);
                }
            }
        });
    })();

    // ===== 4. 回到顶部与弹窗控制 =====
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backBtn.classList.remove('opacity-0', 'invisible');
            backBtn.classList.add('opacity-100', 'visible');
        } else {
            backBtn.classList.add('opacity-0', 'invisible');
            backBtn.classList.remove('opacity-100', 'visible');
        }
    });
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // 设置弹窗
    const openSettingsBtn = document.getElementById('openSettings');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettings');
    
    openSettingsBtn.addEventListener('click', () => {
        settingsModal.classList.remove('hidden');
        settingsModal.classList.add('flex');
    });
    
    closeSettingsBtn.addEventListener('click', () => {
        settingsModal.classList.add('hidden');
        settingsModal.classList.remove('flex');
    });
    
    settingsModal.addEventListener('click', (e) => {
        if (e.target === settingsModal) {
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
        }
    });

    // 确保在 DOM 加载完成后也尝试渲染 (以防load事件被覆盖)
    document.addEventListener('DOMContentLoaded', () => {
        renderPdfList();
    });
</script>
</body>
</html>
